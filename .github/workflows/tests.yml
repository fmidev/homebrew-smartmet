name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
# These runs build formulae from source (slow), so don't waste CI minutes on
# stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        # macOS-only tap — Linux users should use FMI's RPMs.
        # Apple Silicon only: upstream Homebrew core doesn't ship Intel
        # bottles for macOS 15 (sequoia) for the deps we need
        # (boost, fmt, howard-hinnant-date, libpq, libpqxx). Without those,
        # brew test-bot's "unbottled dependencies" check skips our entire
        # chain. Intel macOS 14 (sonoma) bottles do exist but the runner is
        # gone from GitHub Actions.
        os: [ macos-26 ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
